title: Sitio
tabs:

  # Pages
  pages:
    label:
      es: Páginas
      en: Pages
    icon: dashboard
    sections:

      # Pages
      pages:
        headline: Pages
        type: pages

  # Site data
  data:
    label:
      es: Datos del sitio
      en: Site data
    icon: info
    columns:

      # Data / Content
      content:
        width: 2/3
        sections:

          identity:
            type: fields
            fields:
              logo:
                label:
                  es: Logotipo
                  en: Logo
                type: files
                max: 1
                multiple: false
                layout: cards
                query: site.images
                uploads: image
                image:
                  back: white
              favicon:
                label:
                  es: Favicon
                  en: Favicon
                type: files
                max: 1
                multiple: false
                layout: cards
                query: site.images
                uploads: image
                image:
                  back: white
              disclaimer:
                label:
                  es: Disclaimer
                  en: Disclaimer
                type: textarea

          contact:
            type: fields
            fields:
              email:
                label:
                  es: Email
                  en: Email
                type: email
                width: 1/2
              phone:
                label:
                  es: Teléfono
                  en: Phone
                type: tel
                width: 1/2

          social:
            type: fields
            fields:
              socialHeadline:
                label:
                  es: Redes sociales
                  en: Social
                type: headline
              instagram:
                label: Instagram
                type: url
                width: 1/2
              facebook:
                label: Facebook
                type: url
                width: 1/2
              tiktok:
                label: TikTok
                type: url
                width: 1/2
              x:
                label: X
                type: url
                width: 1/2

      # Data / Sidebar
      sidebar:
        sticky: true
        width: 1/3
        sections:
          files:
            headline:
              es: Archivos
              en: Files
            type: files

  # Settings
  settings:
    label:
      es: Configuration
      en: Settings
    icon: settings
    columns:

      # Settings/Content
      content:
        type: fields
        width: 2/3
        fields:

          settingsLine:
            type: line

      # Settings/Sidebar
      sidebar:
        sticky: true
        width: 1/3
        sections:
          files:
            type: files
